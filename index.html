<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0d10">
<title>Keyscope v1.1.1 – Live Key + BPM</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#14171c; --line:#232830;
    --text:#e8ecf0; --muted:#69737f;
    --key-h:210;
    --accent:hsl(var(--key-h) 85% 60%);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,"SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:max(12px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));
    overscroll-behavior:none;user-select:none;-webkit-user-select:none;
  }
  .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace}

  header{width:100%;max-width:440px;display:flex;align-items:center;justify-content:space-between;padding:2px 2px 10px}
  .brand{font-weight:700;letter-spacing:.14em;font-size:13px}
  .brand span{color:var(--muted);font-weight:400;letter-spacing:.05em;font-size:11px;margin-left:6px}
  .status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:#3a414b;transition:background .3s}
  .dot.live{background:var(--accent);box-shadow:0 0 8px var(--accent)}

  .wheelwrap{position:relative;width:min(82vw,360px);aspect-ratio:1;margin:0 0 8px}
  svg{width:100%;height:100%;display:block}
  .seg{fill:#171b21;stroke:var(--bg);stroke-width:2;transition:fill .5s,filter .5s}
  .seg.hit{filter:drop-shadow(0 0 10px var(--accent))}
  .seglabel{fill:#5a6470;font-size:13px;font-weight:600;pointer-events:none;transition:fill .5s}
  .seglabel.hit{fill:#0b0d10;font-weight:800}
  .seglabel.near{fill:var(--text)}

  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
  .keyname{font-size:44px;font-weight:800;letter-spacing:-.01em;line-height:1.05;color:var(--accent);transition:color .5s;text-shadow:0 0 24px color-mix(in srgb,var(--accent) 40%,transparent)}
  .code{font-size:15px;color:var(--text);margin-top:7px;font-weight:600;letter-spacing:.04em}
  .code span{color:var(--muted);font-weight:400}
  .conf{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.08em}
  .alt{font-size:11px;color:var(--muted);margin-top:2px}
  .alt b{color:var(--text)}

  .statrow{width:100%;max-width:440px;display:flex;gap:10px;margin-bottom:10px}
  .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 14px;text-align:center}
  .stat h2{font-size:10px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:4px}
  .stat .big{font-size:34px;font-weight:800;line-height:1.05}
  .stat .sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.06em}
  #bpm{color:var(--accent);transition:color .5s}

  .panel{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .panel h2{font-size:10px;letter-spacing:.16em;color:var(--muted);font-weight:600;margin-bottom:8px}

  .compat{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:7px 12px;border-radius:999px;border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--text)}
  .chip b{color:var(--accent)}
  .chip small{color:var(--muted);font-weight:400;margin-left:5px;font-size:11px}

  .chroma{display:flex;gap:3px;height:40px;align-items:flex-end}
  .chroma .bar{flex:1;background:#242a33;border-radius:3px 3px 0 0;min-height:2px;transition:height .15s}
  .chroma .bar.top{background:var(--accent)}
  .chromalabels{display:flex;gap:3px;margin-top:4px}
  .chromalabels div{flex:1;text-align:center;font-size:9px;color:var(--muted)}

  .level{height:4px;border-radius:2px;background:#242a33;overflow:hidden;margin-top:10px}
  .level i{display:block;height:100%;width:0;background:var(--accent);transition:width .12s}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .hint.warn{color:#e0a24a}

  #histlist{display:flex;flex-direction:column;gap:6px;max-height:150px;overflow-y:auto}
  .hrow{display:flex;align-items:center;gap:10px;font-size:13px}
  .hrow .t{color:var(--muted);font-size:11px;width:44px}
  .hrow .k{font-weight:700;width:48px}
  .hrow .n{color:var(--text);flex:1}
  .hrow .b{color:var(--muted);font-size:12px}
  .empty{color:var(--muted);font-size:12px}

  button#go{
    width:100%;max-width:440px;padding:16px;border:none;border-radius:14px;
    font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;
    background:var(--accent);color:#0b0d10;transition:background .3s;
  }
  button#go.running{background:#242a33;color:var(--text);border:1px solid var(--line)}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<header>
  <div class="brand">KEYSCOPE<span>v1.1.1</span></div>
  <div class="status"><div class="dot" id="dot"></div><span id="statustext">Bereit</span></div>
</header>

<div class="wheelwrap">
  <svg id="wheel" viewBox="0 0 400 400"></svg>
  <div class="center">
    <div class="keyname" id="keyname">Warte auf Musik</div>
    <div class="code mono" id="code"></div>
    <div class="conf" id="conf"></div>
    <div class="alt" id="alt"></div>
  </div>
</div>

<div class="statrow">
  <div class="stat">
    <h2>TEMPO</h2>
    <div class="big mono" id="bpm">–</div>
    <div class="sub" id="bpmsub">BPM</div>
  </div>
  <div class="stat">
    <h2>LAUFZEIT</h2>
    <div class="big mono" id="clock">0:00</div>
    <div class="sub">SESSION</div>
  </div>
</div>

<div class="panel">
  <h2>PASST ZUM MIX</h2>
  <div class="compat" id="compat"><span class="empty">Noch keine Tonart erkannt</span></div>
</div>

<div class="panel">
  <h2>SET-VERLAUF</h2>
  <div id="histlist"><span class="empty">Erkannte Tracks erscheinen hier</span></div>
</div>

<div class="panel">
  <h2>CHROMAGRAM · 12 TONKLASSEN</h2>
  <div class="chroma" id="chroma"></div>
  <div class="chromalabels" id="chromalabels"></div>
  <div class="level"><i id="lvl"></i></div>
  <div class="hint" id="hint">Handy in Richtung Lautsprecher halten. Key stabilisiert sich nach 5–10 s, BPM nach ca. 10–15 s.</div>
</div>

<button id="go">Erkennung starten</button>

<script>
"use strict";

/* ── Musiktheorie ─────────────────────────────── */
const NOTES = ["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
const MAJ_NUM = {0:8,1:3,2:10,3:5,4:12,5:7,6:2,7:9,8:4,9:11,10:6,11:1};
const MIN_NUM = {0:5,1:12,2:7,3:2,4:9,5:4,6:11,7:6,8:1,9:8,10:3,11:10};
const P_MAJ = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const P_MIN = [6.33,3.52,2.54,3.53,3.98,4.75,2.68,3.98,2.69,3.34,3.17,3.79];

function camelot(pc,minor){ return (minor?MIN_NUM:MAJ_NUM)[pc]+(minor?"A":"B"); }
function shortName(pc,minor){ return NOTES[pc]+(minor?"m":""); }
function keyName(pc,minor){ return NOTES[pc]+(minor?"-Moll":"-Dur"); }
function hueFor(num){ return ((num%12)*30+200)%360; }

function pearson(a,b){
  let n=12,sa=0,sb=0,saa=0,sbb=0,sab=0;
  for(let i=0;i<n;i++){sa+=a[i];sb+=b[i];saa+=a[i]*a[i];sbb+=b[i]*b[i];sab+=a[i]*b[i];}
  const num=n*sab-sa*sb, den=Math.sqrt((n*saa-sa*sa)*(n*sbb-sb*sb));
  return den===0?0:num/den;
}
function detectKey(chroma){
  let results=[];
  for(let root=0;root<12;root++){
    const rot=[]; for(let i=0;i<12;i++) rot.push(chroma[(i+root)%12]);
    results.push({pc:root,minor:false,r:pearson(rot,P_MAJ)});
    results.push({pc:root,minor:true, r:pearson(rot,P_MIN)});
  }
  results.sort((a,b)=>b.r-a.r);
  return {best:results[0],second:results[1],gap:results[0].r-results[1].r};
}

/* ── Camelot Wheel ────────────────────────────── */
const svg=document.getElementById("wheel");
const NS="http://www.w3.org/2000/svg";
const segs={},labels={};
function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
function segPath(cx,cy,r1,r2,a1,a2){
  const [x1,y1]=polar(cx,cy,r2,a1),[x2,y2]=polar(cx,cy,r2,a2),
        [x3,y3]=polar(cx,cy,r1,a2),[x4,y4]=polar(cx,cy,r1,a1);
  return `M${x1},${y1} A${r2},${r2} 0 0 1 ${x2},${y2} L${x3},${y3} A${r1},${r1} 0 0 0 ${x4},${y4} Z`;
}
(function buildWheel(){
  const cx=200,cy=200;
  const rings=[{letter:"B",r1:150,r2:195},{letter:"A",r1:104,r2:148}];
  for(const ring of rings){
    for(let n=1;n<=12;n++){
      const c=(n%12)*30,a1=c-14.4,a2=c+14.4;
      const p=document.createElementNS(NS,"path");
      p.setAttribute("d",segPath(cx,cy,ring.r1,ring.r2,a1,a2));
      p.setAttribute("class","seg"); svg.appendChild(p);
      const rm=(ring.r1+ring.r2)/2,[tx,ty]=polar(cx,cy,rm,c);
      const t=document.createElementNS(NS,"text");
      t.setAttribute("x",tx);t.setAttribute("y",ty+4.5);
      t.setAttribute("text-anchor","middle");
      t.setAttribute("class","seglabel mono");
      t.textContent=n+ring.letter; svg.appendChild(t);
      segs[n+ring.letter]=p; labels[n+ring.letter]=t;
    }
  }
})();
function neighbors(code){
  const num=parseInt(code),let_=code.slice(-1);
  const up=(num%12)+1,dn=((num+10)%12)+1;
  return [
    {c:num+(let_==="A"?"B":"A"),why:let_==="A"?"Dur-Wechsel":"Moll-Wechsel"},
    {c:up+let_,why:"+1 energetischer"},
    {c:dn+let_,why:"−1 ruhiger"}
  ];
}
function paintWheel(code){
  const num=code?parseInt(code):null;
  const hue=num?hueFor(num):210;
  document.documentElement.style.setProperty("--key-h",hue);
  const near=code?neighbors(code).map(n=>n.c):[];
  for(const k in segs){
    const s=segs[k],l=labels[k];
    s.classList.remove("hit");l.classList.remove("hit","near");
    if(k===code){s.style.fill=`hsl(${hue} 85% 60%)`;s.classList.add("hit");l.classList.add("hit");}
    else if(near.includes(k)){s.style.fill=`hsl(${hueFor(parseInt(k))} 45% 24%)`;l.classList.add("near");}
    else s.style.fill="";
  }
}

/* ── UI ───────────────────────────────────────── */
const $=id=>document.getElementById(id);
const el={go:$("go"),dot:$("dot"),status:$("statustext"),code:$("code"),keyname:$("keyname"),
  conf:$("conf"),alt:$("alt"),compat:$("compat"),chroma:$("chroma"),lvl:$("lvl"),hint:$("hint"),
  bpm:$("bpm"),bpmsub:$("bpmsub"),clock:$("clock"),hist:$("histlist")};
const chromaBars=[];
const CL=$("chromalabels");
for(let i=0;i<12;i++){
  const b=document.createElement("div");b.className="bar";
  el.chroma.appendChild(b);chromaBars.push(b);
  const l=document.createElement("div");l.textContent=NOTES[i];CL.appendChild(l);
}

/* ── Audio-Engine ─────────────────────────────── */
let ctx=null,analyser=null,stream=null,running=false;
let freqBuf=null,byteBuf=null,chromaAcc=new Float32Array(12);
let displayCode=null,candidate=null,candidateCount=0,wakeLock=null;
let startTime=0,loopTimer=null,clockTimer=null;
const FMIN=60,FMAX=2200,DECAY=0.94,SWITCH_AFTER=16;

/* BPM */
let envBuf=[],lastBassE=0,bpmEstimates=[],bpmShown=null;

async function start(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{
      echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
  }catch(e){
    el.hint.textContent="Mikrofonzugriff verweigert. In Safari über https öffnen und Zugriff erlauben.";
    el.hint.classList.add("warn");return;
  }
  ctx=new (window.AudioContext||window.webkitAudioContext)();
  await ctx.resume();
  const src=ctx.createMediaStreamSource(stream);
  analyser=ctx.createAnalyser();
  analyser.fftSize=8192;
  analyser.smoothingTimeConstant=0.4;
  src.connect(analyser);
  freqBuf=new Float32Array(analyser.frequencyBinCount);
  byteBuf=new Uint8Array(analyser.frequencyBinCount);
  chromaAcc.fill(0);displayCode=null;candidate=null;candidateCount=0;
  envBuf=[];lastBassE=0;bpmEstimates=[];bpmShown=null;
  startTime=performance.now();

  running=true;
  el.go.textContent="Erkennung stoppen";el.go.classList.add("running");
  el.dot.classList.add("live");el.status.textContent="Live";
  el.hint.textContent="Handy in Richtung Lautsprecher halten. Key stabilisiert sich nach 5–10 s, BPM nach ca. 10–15 s.";
  el.hint.classList.remove("warn");
  try{wakeLock=await navigator.wakeLock?.request("screen");}catch(e){}
  loopTimer=setInterval(tick,100);
  clockTimer=setInterval(updClock,1000);
  requestAnimationFrame(rafLoop);
}

function stop(){
  running=false;
  clearInterval(loopTimer);clearInterval(clockTimer);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  if(ctx)ctx.close();
  wakeLock?.release();wakeLock=null;
  el.go.textContent="Erkennung starten";el.go.classList.remove("running");
  el.dot.classList.remove("live");el.status.textContent="Bereit";
}

function updClock(){
  const s=Math.floor((performance.now()-startTime)/1000);
  el.clock.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
}

/* Onset-Envelope mit ~60 Hz sammeln */
function rafLoop(){
  if(!running)return;
  analyser.getByteFrequencyData(byteBuf);
  const binHz=ctx.sampleRate/analyser.fftSize;
  let e=0;
  const i0=Math.max(1,Math.floor(30/binHz)),i1=Math.ceil(180/binHz);
  for(let i=i0;i<=i1;i++)e+=byteBuf[i];
  const flux=Math.max(0,e-lastBassE);lastBassE=e;
  const t=performance.now()/1000;
  envBuf.push({t,v:flux});
  while(envBuf.length&&t-envBuf[0].t>10)envBuf.shift();
  requestAnimationFrame(rafLoop);
}

function computeBPM(){
  if(envBuf.length<200)return null;
  const t1=envBuf[envBuf.length-1].t,FS=50,SEC=8,N=FS*SEC,t0=t1-SEC;
  if(envBuf[0].t>t0)return null;
  const grid=new Float32Array(N);
  let j=0;
  for(let i=0;i<N;i++){
    const t=t0+i/FS;
    while(j<envBuf.length-1&&envBuf[j+1].t<t)j++;
    const a=envBuf[j],b=envBuf[Math.min(j+1,envBuf.length-1)];
    const f=b.t>a.t?Math.max(0,Math.min(1,(t-a.t)/(b.t-a.t))):0;
    grid[i]=a.v+(b.v-a.v)*f;
  }
  let m=0;for(let i=0;i<N;i++)m+=grid[i];m/=N;
  let p=0;for(let i=0;i<N;i++){grid[i]-=m;p+=grid[i]*grid[i];}
  p/=N; if(p<1)return null;
  const lagMin=Math.floor(FS*60/190),lagMax=Math.ceil(FS*60/60);
  const acf=new Float32Array(lagMax+1);
  let best=0,bestLag=0;
  for(let lag=lagMin;lag<=lagMax;lag++){
    let s=0;for(let i=0;i<N-lag;i++)s+=grid[i]*grid[i+lag];
    s/=(N-lag);acf[lag]=s;
    if(s>best){best=s;bestLag=lag;}
  }
  if(!bestLag||best/p<0.08)return null;
  // Parabolische Verfeinerung
  let lag=bestLag;
  if(bestLag>lagMin&&bestLag<lagMax){
    const y0=acf[bestLag-1],y1=acf[bestLag],y2=acf[bestLag+1];
    const d=(y0-y2)/(2*(y0-2*y1+y2)||1);
    if(Math.abs(d)<1)lag=bestLag+d;
  }
  let bpm=60*FS/lag;
  while(bpm<85)bpm*=2;
  while(bpm>175)bpm/=2;
  return bpm;
}

function median(a){const s=[...a].sort((x,y)=>x-y);return s[Math.floor(s.length/2)];}

function tick(){
  analyser.getFloatFrequencyData(freqBuf);
  const sr=ctx.sampleRate,binHz=sr/analyser.fftSize;
  const chroma=new Float32Array(12);
  let energy=0;
  const i0=Math.max(1,Math.floor(FMIN/binHz)),i1=Math.min(freqBuf.length-1,Math.ceil(FMAX/binHz));
  for(let i=i0;i<=i1;i++){
    const db=freqBuf[i];
    if(db<-85)continue;
    const mag=Math.pow(10,db/20),f=i*binHz;
    const pc=((Math.round(12*Math.log2(f/440))%12)+12+9)%12;
    chroma[pc]+=mag;energy+=mag;
  }
  el.lvl.style.width=Math.min(100,energy*900)+"%";

  /* BPM alle 500 ms neu schätzen */
  if(Math.floor(performance.now()/500)!==Math.floor((performance.now()-100)/500)){
    const b=computeBPM();
    if(b){
      bpmEstimates.push(b);
      if(bpmEstimates.length>9)bpmEstimates.shift();
      if(bpmEstimates.length>=4){
        const med=median(bpmEstimates);
        // Streuung als Qualitätsmaß
        const dev=median(bpmEstimates.map(x=>Math.abs(x-med)));
        bpmShown=med;
        el.bpm.textContent=med.toFixed(1);
        el.bpmsub.textContent=dev<0.8?"BPM · STABIL":"BPM · SCHÄTZUNG";
      }
    }
  }

  if(energy<0.004)return;
  const sum=chroma.reduce((a,b)=>a+b,0)||1;
  for(let i=0;i<12;i++)chromaAcc[i]=chromaAcc[i]*DECAY+(chroma[i]/sum)*(1-DECAY);

  const mx=Math.max(...chromaAcc)||1,top=chromaAcc.indexOf(mx);
  chromaBars.forEach((b,i)=>{
    b.style.height=Math.max(3,(chromaAcc[i]/mx)*40)+"px";
    b.classList.toggle("top",i===top);
  });

  const {best,second,gap}=detectKey(chromaAcc);
  const code=camelot(best.pc,best.minor);
  const confidence=Math.max(0,Math.min(1,(best.r-0.3)/0.55));

  if(code!==displayCode){
    if(code===candidate){candidateCount++;}else{candidate=code;candidateCount=1;}
    if(candidateCount>=SWITCH_AFTER||displayCode===null){
      displayCode=code;
      show(best.pc,best.minor,code,confidence);
      addHistory(code,shortName(best.pc,best.minor));
    }
  }else{
    candidate=null;candidateCount=0;
    el.conf.textContent="SICHERHEIT "+Math.round(confidence*100)+" %";
  }
  // Alternative bei knappem Rennen (z. B. Übergang mit 2 Decks)
  if(gap<0.05){
    el.alt.innerHTML="evtl. auch <b>"+keyName(second.pc,second.minor)+"</b> ("+camelot(second.pc,second.minor)+")";
  }else el.alt.textContent="";
}

function show(pc,minor,code,confidence){
  el.keyname.textContent=keyName(pc,minor);
  el.code.innerHTML=shortName(pc,minor)+" <span>· Camelot "+code+"</span>";
  el.conf.textContent="SICHERHEIT "+Math.round(confidence*100)+" %";
  paintWheel(code);
  el.compat.innerHTML="";
  for(const nb of neighbors(code)){
    const c=document.createElement("div");c.className="chip mono";
    c.innerHTML="<b>"+nb.c+"</b><small>"+nb.why+"</small>";
    el.compat.appendChild(c);
  }
}

let lastHist=null;
function addHistory(code,name){
  if(code===lastHist)return;
  lastHist=code;
  if(el.hist.querySelector(".empty"))el.hist.innerHTML="";
  const s=Math.floor((performance.now()-startTime)/1000);
  const t=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
  const row=document.createElement("div");row.className="hrow";
  row.innerHTML='<span class="t mono">'+t+'</span><span class="k mono" style="color:hsl('+hueFor(parseInt(code))+' 85% 60%)">'+name+'</span><span class="n">Camelot '+code+'</span><span class="b mono">'+(bpmShown?bpmShown.toFixed(1):"–")+'</span>';
  el.hist.prepend(row);
  while(el.hist.children.length>20)el.hist.lastChild.remove();
}

el.go.addEventListener("click",()=>{running?stop():start();});
document.addEventListener("visibilitychange",async()=>{
  if(document.visibilityState==="visible"&&running){
    try{wakeLock=await navigator.wakeLock?.request("screen");}catch(e){}
  }
});
paintWheel(null);
</script>
</body>
</html>
